# BLURRING
# methods: none, gaussian, box, kernel (define custom kernel), dual_kawase
blur:
{
  method = "dual_kawase";
  size = 1;
  strength = 13;
# default deviation is 0.84
# deviation = false;
};

# semi-transparent
blur-background = true

# blur-background-frame = true
# Use fixed blur strength rather than adjusting according to window opacity.
blur-background-fixed = true

# SHADOWS
# shadow = true;
shadow-radius = 1; #blur radius
shadow-opacity = .1
shadow-offset-x = 0;
shadow-offset-y = 0;
# shadow-color = "#000000"
# shadow-exclude = [];


# FADING
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 3
# OTHER SETTINGS
# dbus = true
# daemon = false

# backends: `xrender`, `glx`, `egl` or `xr_glx_hybrid`
backend = "egl";
dithered-present = false;
vsync = true;
# mark-wmwin-focused = true;
# mark-ovredir-focused = true;
detect-rounded-corners = false
detect-client-opacity = true;
use-ewmh-active-win = true
detect-transient = true;
# glx-no-stencil = true
use-damage = true;
log-level = "warn";

# WINDDOW RULES
rules = (
       { match = "class_g = 'dwm'"; opacity = 0.60; },
       { match = "class_g = 'Rofi'"; opacity = 0.70; },
       { match = "class_g = 'Thunar'"; opacity = 0.95; },
       { match = "class_g = 'mpv'"; opacity = 1.0; },
       { match = "class_g = 'dmenu'"; opacity = 0.70; },
       { match = "class_g = 'Zathura'"; opacity = 0.80; },
       { match = "class_g = 'Emacs'"; opacity = 0.70; },
       { match = "class_g = 'chatgpt-desktop-client'"; opacity = 0.70; },
       { match = "class_g = 'alacritty'"; opacity = 0.7; },
       { match = "class_i = 'Telegram'"; opacity = 0.7; },
       { match = "class_g = 'whatsapp-electron'"; opacity = 0.60; },
       { match = "class_g = 'firefox'"; opacity = 0.90; },
       { match = "class_g = 'qutebrowser'"; opacity = 0.95; },
       { match = "class_g = 'st-256color'"; opacity = 0.70; },
      { match = "tooltip"; fade = true; shadow = true; opacity = 0.5; focus = true; full-shadow = false; },
      { match = "popup_menu"; opacity = 0.5; },
      { match = "dropdown_menu"; opacity = 0.5; },
)
