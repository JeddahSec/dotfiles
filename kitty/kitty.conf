# BEGIN_KITTY_FONTS
font_family      family='JetBrainsMono Nerd Font Mono' postscript_name=JetBrainsMonoNFM-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

font_size 26
adjust_line_height 170%
modify_font line_height 170%
disable_ligatures never

# =====================================================================
# THEME & LOOK
# =====================================================================
# BEGIN_KITTY_THEME
# Doom One
include current-theme.conf
# END_KITTY_THEME

# Cursor & Window Settings
cursor_blink_interval 0
cursor_beam_thickness 4
mouse_hide_wait 3.0
detect_urls yes

enable_audio_bell no
hide_window_decorations yes  # Set to "titlebar-only" instead if on macOS and you want native window buttons
window_padding_width 10
map ctrl+shift+t launch --cwd=current --type=tab

# Cursor Trail (Uncomment these if you want to try the modern trail effect!)
# cursor_trail 20
# cursor_trail_start_threshold 2
# cursor_trail_decay 0.0 0.10

# =====================================================================
# NAVIGATION & LAYOUTS
# =====================================================================
enabled_layouts splits,stack,tall,fat

# Window navigation (Vim-style splits)
map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down

# Toggle zoom/full screen on a split window
map ctrl+shift+z toggle_layout stack

# Scrolling buffers
map alt+k        scroll_line_up
map alt+j      scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down

# Move tabs left/right to reorder
map alt+ctrl+left      move_tab_backward
map alt+ctrl+right     move_tab_forward

# Named buffers for copying/pasting
map alt+c copy_to_buffer a
map alt+v paste_from_buffer a
map f3 copy_to_buffer b
map f4 paste_from_buffer b

# =====================================================================
# CATPPUCCIN MOCHA BUBBLE TAB BAR
# =====================================================================
tab_bar_edge            bottom
tab_bar_style           separator
tab_separator           "│"
tab_bar_margin_width    9.0
tab_bar_margin_height   6.0 0.0

active_tab_title_template   "{fmt.fg._11111b}{fmt.bg._cba6f7}  {index}: {title}{' [Z]' if layout_name == 'stack' else ''}  "
inactive_tab_title_template "{fmt.fg._cdd6f4}{fmt.bg._181825}  {index}: {title}  "
# active_tab_foreground   #11111b
# active_tab_background   #cba6f7
# inactive_tab_foreground #cdd6f4
# inactive_tab_background #181825
# tab_bar_background      #11111b
